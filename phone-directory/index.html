<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f172a">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>📞 St. Joseph's Directory</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700&family=JetBrains+Mono:wght@400;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0f172a;--surface:#1e293b;--surface-hover:#273548;--border:#334155;--text:#f1f5f9;--text-dim:#94a3b8;--accent:#38bdf8;--phone-color:#4ade80;--danger:#f87171;--radius:12px}
html{font-size:15px}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;padding-bottom:env(safe-area-inset-bottom,20px);-webkit-font-smoothing:antialiased}
.header{position:sticky;top:0;z-index:100;background:rgba(15,23,42,0.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:16px 16px 12px}
.header h1{font-size:1.4rem;font-weight:700;letter-spacing:-0.02em;margin-bottom:12px;text-align:center}
.search-wrap{position:relative}
.search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-dim);pointer-events:none}
.search-input{width:100%;padding:10px 12px 10px 38px;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:inherit;font-size:0.93rem;outline:none;transition:border-color 0.2s}
.search-input::placeholder{color:var(--text-dim);opacity:0.6}
.search-input:focus{border-color:var(--accent)}
.content{padding:12px 12px 40px}
.critical-section{margin-bottom:8px;border-radius:var(--radius);overflow:hidden;border:1px solid var(--border)}
.critical-header{padding:10px 14px;background:var(--surface);font-size:0.95rem;font-weight:700;letter-spacing:-0.01em;border-bottom:1px solid var(--border);color:var(--accent)}
.critical-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:10px;background:var(--surface)}
.crit-btn{display:flex;align-items:center;justify-content:center;text-align:center;padding:10px 6px;border-radius:8px;background:rgba(255,255,255,0.04);color:var(--text);font-family:inherit;font-size:0.8rem;font-weight:600;text-decoration:none;line-height:1.25;min-height:48px;border:1px solid var(--border);-webkit-user-select:none;user-select:none;transition:background 0.15s}
.crit-btn:active{background:var(--surface-hover)}
.crit-btn.urgent{color:var(--danger);border-color:rgba(248,113,113,0.25);background:rgba(248,113,113,0.07)}
.crit-btn.urgent:active{background:rgba(248,113,113,0.15)}
.accordion{margin-bottom:8px;border-radius:var(--radius);overflow:hidden;border:1px solid var(--border)}
.accordion-header{display:flex;justify-content:space-between;align-items:center;padding:14px;background:var(--surface);cursor:pointer;-webkit-user-select:none;user-select:none;transition:background 0.15s}
.accordion-header:active{background:var(--surface-hover)}
.accordion-title{font-size:0.95rem;font-weight:700;letter-spacing:-0.01em;color:var(--accent)}
.accordion-chevron{width:20px;height:20px;color:var(--text-dim);transition:transform 0.25s ease;flex-shrink:0}
.accordion.open .accordion-chevron{transform:rotate(180deg)}
.accordion-body{max-height:0;overflow:hidden;transition:max-height 0.3s ease;background:var(--surface)}
.accordion.open .accordion-body{max-height:3000px}
.accordion-body-inner{border-top:1px solid var(--border)}
.sub-header{padding:8px 14px 4px;font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-dim);background:rgba(255,255,255,0.02);border-top:1px solid rgba(255,255,255,0.04)}
.sub-header:first-child{border-top:none}
.phone-row{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;border-bottom:1px solid rgba(255,255,255,0.04);transition:background 0.15s;color:inherit;-webkit-user-select:none;user-select:none;cursor:pointer;flex-wrap:wrap}
.phone-row:last-child{border-bottom:none}
.phone-row:not(.placeholder):active{background:var(--surface-hover)}
.phone-label{font-size:0.9rem;font-weight:500;color:var(--text);flex:1;padding-right:12px;line-height:1.3}
.phone-number{font-family:'JetBrains Mono',monospace;font-size:0.85rem;font-weight:600;color:var(--phone-color);white-space:nowrap;display:flex;align-items:center;gap:6px;text-decoration:none;background:rgba(74,222,128,0.10);padding:5px 9px;border-radius:7px}
.phone-number .call-icon{width:18px;height:18px;opacity:0.85;flex-shrink:0}
.phone-row.urgent .phone-label{color:var(--danger);font-weight:700}
.phone-row.urgent .phone-number{color:var(--danger);background:rgba(248,113,113,0.10)}
.phone-row.placeholder{pointer-events:none;cursor:default}
.phone-row.placeholder .phone-number{color:var(--text-dim);font-style:italic;font-weight:400;background:transparent;border:1px dashed var(--border)}
.phone-detail{width:100%;max-height:0;overflow:hidden;transition:max-height 0.25s ease;border-top-width:0}
.phone-row.open .phone-detail{max-height:400px;border-top:1px solid rgba(255,255,255,0.06)}
.detail-line{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;border-bottom:1px solid rgba(255,255,255,0.04)}
.detail-line:last-child{border-bottom:none}
.detail-label{font-size:0.82rem;color:var(--text-dim);flex:1;padding-right:10px}
.detail-call-btn{font-family:'JetBrains Mono',monospace;font-size:0.8rem;font-weight:600;color:var(--phone-color);background:rgba(74,222,128,0.10);padding:4px 10px;border-radius:6px;text-decoration:none;white-space:nowrap;display:flex;align-items:center;gap:5px}
.detail-call-btn .call-icon{width:15px;height:15px;opacity:0.85;flex-shrink:0}
.no-results{text-align:center;padding:40px 20px;color:var(--text-dim);font-size:0.95rem;display:none}
.no-results.visible{display:block}
.regan-note{font-size:0.72rem;color:var(--text-dim);padding:4px 14px 6px;font-style:italic}
.hidden{display:none!important}
@media(min-width:600px){.content{max-width:540px;margin:0 auto}.header>*{max-width:540px;margin-left:auto;margin-right:auto}}
</style>
</head>
<body>
<div class="header">
  <h1>📞 St. Joseph's Directory</h1>
  <div class="search-wrap">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" class="search-input" placeholder="Search contacts..." oninput="filterContacts()" id="searchInput">
  </div>
</div>
<div class="content" id="directory-content"></div>
<div style="text-align:center;padding:24px 16px 8px">
  <a href="https://forms.gle/PFFs27XwmE9R3WnBA" target="_blank" rel="noopener" style="color:var(--text-dim);font-size:0.82rem;text-decoration:none;opacity:0.7">💬 Have feedback? Let us know</a>
</div>
<script>
const CALL_SVG='<svg class="call-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>';
const BASE='973754';
const PAGING='9737545678';
const SECTION_DISPLAY={
  'Critical':'🚨 Critical / Frequently Used',
  'Main OR':'🏥 Main OR',
  'SDS':'🏥 SDS',
  'Departments':'🏥 Departments',
  'Floors':'🏢 Floors',
  'On-Call Services':'📟 On-Call Services',
  'PAT Office':'🩺 PAT Office',
  'Services':'🔧 Services'
};

function htmlEsc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function parseCSV(text){
  const lines=text.trim().split('\n');
  const headers=lines[0].split(',').map(h=>h.trim());
  return lines.slice(1).map(line=>{
    const vals=line.split(',');
    const obj={};
    headers.forEach((h,i)=>{obj[h]=(vals[i]||'').trim();});
    obj.urgent=obj.urgent==='true';
    return obj;
  });
}

function primaryHref(e){
  if(e.type1) return 'tel:'+e.type1;
  if(e.type3) return 'tel:'+BASE+e.type3;
  if(e.type2) return 'tel:'+BASE+e.type2;
  if(e.type4) return 'tel:'+PAGING;
  return '#';
}

function fmtCell(n){return n.slice(0,3)+'-'+n.slice(3,6)+'-'+n.slice(6)}

function buildDetailLines(e){
  const lines=[];
  if(e.type1) lines.push({label:'Cell · '+fmtCell(e.type1),href:'tel:'+e.type1});
  if(e.type2&&e.type3){
    lines.push({label:'Ext '+e.type2+' (in-hospital)',href:'tel:'+BASE+e.type2});
    lines.push({label:'Ext '+e.type3+' (external: 973-754-'+e.type3+')',href:'tel:'+BASE+e.type3});
  } else if(e.type2){
    lines.push({label:'Ext '+e.type2+' · 973-754-'+e.type2,href:'tel:'+BASE+e.type2});
  } else if(e.type3){
    lines.push({label:'Ext '+e.type3+' (external: 973-754-'+e.type3+')',href:'tel:'+BASE+e.type3});
  }
  if(e.type4) lines.push({label:'Pager '+e.type4,href:'tel:'+PAGING});
  return lines;
}

function createContactRow(entry){
  const div=document.createElement('div');
  div.className='phone-row'+(entry.urgent?' urgent':'');
  if(entry.search) div.dataset.search=entry.search;
  const detailLines=buildDetailLines(entry);
  let detailHTML='';
  if(detailLines.length){
    detailHTML='<div class="phone-detail">'+
      detailLines.map(l=>
        '<div class="detail-line"><span class="detail-label">'+htmlEsc(l.label)+
        '</span><a href="'+l.href+'" class="detail-call-btn">'+CALL_SVG+'Call</a></div>'
      ).join('')+
      '</div>';
  }
  div.innerHTML=
    '<span class="phone-label">'+htmlEsc(entry.label)+'</span>'+
    '<a href="'+primaryHref(entry)+'" class="phone-number">'+CALL_SVG+'Call</a>'+
    detailHTML;
  return div;
}

function toggleExpand(rowEl){
  const wasOpen=rowEl.classList.contains('open');
  const inner=rowEl.closest('.accordion-body-inner');
  if(inner) inner.querySelectorAll('.phone-row.open').forEach(r=>r.classList.remove('open'));
  if(!wasOpen) rowEl.classList.add('open');
}

function toggleAccordion(header){header.parentElement.classList.toggle('open')}

function buildCriticalSection(rows){
  const sec=document.createElement('div');
  sec.className='critical-section';
  sec.dataset.accordion='';
  const grid=document.createElement('div');
  grid.className='critical-grid';
  rows.forEach(e=>{
    const a=document.createElement('a');
    a.href=primaryHref(e);
    a.className='crit-btn'+(e.urgent?' urgent':'');
    a.textContent=e.label;
    grid.appendChild(a);
  });
  sec.appendChild(grid);
  return sec;
}

function buildAccordion(sectionName,rows){
  const acc=document.createElement('div');
  acc.className='accordion';
  acc.dataset.accordion='';
  acc.innerHTML=
    '<div class="accordion-header" onclick="toggleAccordion(this)">'+
      '<span class="accordion-title">'+htmlEsc(SECTION_DISPLAY[sectionName]||sectionName)+'</span>'+
      '<svg class="accordion-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>'+
    '</div>'+
    '<div class="accordion-body"><div class="accordion-body-inner"></div></div>';
  const inner=acc.querySelector('.accordion-body-inner');
  let currentSub=null;
  rows.forEach(entry=>{
    if(entry.subsection&&entry.subsection!==currentSub){
      currentSub=entry.subsection;
      const sh=document.createElement('div');
      sh.className='sub-header';
      sh.textContent=currentSub;
      inner.appendChild(sh);
      if(currentSub==='Regan'){
        const note=document.createElement('div');
        note.className='regan-note';
        note.textContent='Rooms <50 = North wing · Rooms ≥50 = South wing';
        inner.appendChild(note);
      }
    }
    if(entry.label==='To Page (dial then pager #)'){
      const row=document.createElement('div');
      row.className='phone-row placeholder';
      const lbl=document.createElement('span');
      lbl.className='phone-label';
      lbl.textContent=entry.label;
      const ext=document.createElement('span');
      ext.className='phone-number';
      ext.textContent='Ext '+entry.type2;
      row.appendChild(lbl);
      row.appendChild(ext);
      inner.appendChild(row);
    } else {
      inner.appendChild(createContactRow(entry));
    }
  });
  return acc;
}

function buildDirectory(rows){
  const container=document.getElementById('directory-content');
  const sections={};
  rows.forEach(r=>{
    if(!sections[r.section]) sections[r.section]=[];
    sections[r.section].push(r);
  });
  if(sections['Critical']) container.appendChild(buildCriticalSection(sections['Critical']));
  Object.keys(SECTION_DISPLAY).slice(1).forEach(name=>{
    if(sections[name]) container.appendChild(buildAccordion(name,sections[name]));
  });
  const nr=document.createElement('div');
  nr.className='no-results';
  nr.id='no-results';
  nr.textContent='No contacts found';
  container.appendChild(nr);
}

function filterContacts(){
  const query=document.getElementById('searchInput').value.toLowerCase().trim();
  const accordions=document.getElementById('directory-content').querySelectorAll('[data-accordion]');
  let totalVisible=0;
  accordions.forEach(acc=>{
    const rows=acc.querySelectorAll('.phone-row:not(.placeholder),.crit-btn');
    const subHeaders=acc.querySelectorAll('.sub-header');
    let accVisible=0;
    rows.forEach(row=>{
      const label=((row.querySelector('.phone-label')||row).textContent+' '+(row.dataset.search||'')).toLowerCase();
      const match=!query||label.includes(query);
      row.classList.toggle('hidden',!match);
      if(match) accVisible++;
    });
    subHeaders.forEach(sh=>{
      let next=sh.nextElementSibling;
      let anyVisible=false;
      while(next&&!next.classList.contains('sub-header')){
        if((next.classList.contains('phone-row')||next.classList.contains('crit-btn'))&&!next.classList.contains('hidden')){anyVisible=true;break;}
        next=next.nextElementSibling;
      }
      sh.classList.toggle('hidden',!anyVisible);
    });
    acc.querySelectorAll('.regan-note').forEach(note=>{
      const prev=note.previousElementSibling;
      note.classList.toggle('hidden',prev&&prev.classList.contains('hidden'));
    });
    acc.classList.toggle('hidden',accVisible===0&&query.length>0);
    if(query&&accVisible>0) acc.classList.add('open');
    totalVisible+=accVisible;
  });
  const nr=document.getElementById('no-results');
  if(nr) nr.classList.toggle('visible',totalVisible===0&&query.length>0);
}

async function loadContacts(){
  try{
    const res=await fetch('data/contacts.csv');
    if(!res.ok) throw new Error('HTTP '+res.status);
    buildDirectory(parseCSV(await res.text()));
  } catch(err){
    document.getElementById('directory-content').innerHTML=
      '<div style="text-align:center;padding:40px 20px;color:var(--text-dim)">Failed to load contacts. Please refresh.<br><small style="opacity:0.6">'+htmlEsc(String(err))+'</small></div>';
  }
}

document.addEventListener('click',e=>{
  const link=e.target.closest('a[href^="tel:"]');
  if(link){e.preventDefault();e.stopPropagation();window.open(link.href,'_self');}
},true);

document.addEventListener('DOMContentLoaded',()=>{
  loadContacts();
  document.getElementById('directory-content').addEventListener('click',e=>{
    if(e.target.closest('.phone-number,.detail-call-btn')) return;
    const row=e.target.closest('.phone-row');
    if(row&&!row.classList.contains('placeholder')) toggleExpand(row);
  });
});
</script>
</body>
</html>
