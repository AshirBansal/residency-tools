<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Residency Tools</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'DM Sans',sans-serif;background:#0f172a;color:#f1f5f9;min-height:100dvh;display:flex;flex-direction:column;align-items:center;padding:40px 20px}
  h1{font-size:1.8rem;font-weight:700;margin-bottom:8px;text-align:center}
  .subtitle{color:#94a3b8;font-size:0.95rem;margin-bottom:40px;text-align:center}
  .tools{display:flex;flex-direction:column;gap:12px;width:100%;max-width:400px}
  .tool-card{display:flex;align-items:center;gap:16px;padding:18px 20px;background:#1e293b;border:1px solid #334155;border-radius:14px;text-decoration:none;color:#f1f5f9;transition:all 0.2s}
  .tool-card:active{background:#273548;transform:scale(0.98)}
  .tool-icon{font-size:2rem;flex-shrink:0}
  .tool-info h2{font-size:1rem;font-weight:600;margin-bottom:2px}
  .tool-info p{font-size:0.82rem;color:#94a3b8}
  .coming-soon{opacity:0.4;pointer-events:none}
  .coming-soon .tool-info p::after{content:" — Coming Soon";color:#a78bfa}
</style>
</head>
<body>
  <h1>Residency Tools</h1>
  <p class="subtitle">Quick-access apps for residents</p>
  <div class="tools">
    <a href="phone-directory/" class="tool-card">
      <span class="tool-icon">📞</span>
      <div class="tool-info">
        <h2>Hospital Directory</h2>
        <p>Phone extensions for St. Joe's & St. Mike's</p>
      </div>
    </a>
    <div class="tool-card coming-soon">
      <span class="tool-icon">📋</span>
      <div class="tool-info">
        <h2>More Tools</h2>
        <p>Additional tools</p>
      </div>
    </div>
  </div>
</body>
</html>
